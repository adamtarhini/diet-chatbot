<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>diet chat Bot</title>
    <style>

body{
    background-color: #000000;
    font-family: 'Segoe UI', sans-serif;
}
.main {
    background-color: #000000;
    width: 420px;
    height: 600px;
    margin-left: 900px;
    margin-top: 150px;
    border: 2px solid #2a2a3d;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
}

.header{
        padding: 20px;
        background: linear-gradient(135deg, #00f5ff, #7b2fff);
        text-align: center;
        border-radius: 10px 10px 0 0;
}

.header h1{
    font-size: 1.2em;
    font-weight: 700;
}
.header p{
    font-size: 0.8em;
    opacity: 0.8;
}

.content p{
    font-size: 0.7em;
    opacity: 0.8;
    color: white;
    background: #1e1e2e;
    margin-left: 20px;
    margin-right: 300px;
    padding: 10px;
    border-radius: 10px;
    width: 200px;
}

.input{
       display: flex;
    padding-bottom: 10px;
    border-width: 2px solid #2a2a3d;
}
.input button{
    background:linear-gradient(135deg, #00f5ff, #7b2fff);
}
.message.bot {
    color: #ffffff; 
    background-color: #2a2a3d; 
    margin-top: 10px;
    padding: 10px;
    border-radius: 10px;
    width: fit-content;
    max-width: 80%;
}
.content {
    flex: 1;              
    overflow-y: auto;     
}


    </style>
</head>
<body>
    
<div class="main">
<div class="header">
    <h1>Diet ChatBot</h1>
    <p>Ask me anything about nutrition and diet</p>
</div>
<div class="content">
    <div id="messages">
    <p>Hello! I am your diet assistant. Ask me anything about nutrition, healthy eating, or weight management! 🥗</p>
    </div>
</div>
<div id="typing" style="color: rgb(158, 156, 156); margin-left: 20px;"></div>

<div class="input">
    
    <input type="text" id="userInput" name="" href="" placeholder="Ask about diet or nutrition..." style="width: 300px; margin-left: 20px; margin-top: 20px; padding: 10px; border-radius: 5px; border: none; background-color: #000000;color: white;">
    <button id="sendBtn" onclick="sendMessage()" style="margin-left: 7px; margin-top: 20px; padding: 10px 20px; border-radius: 5px; border: none; color: rgb(0, 0, 0); cursor: pointer;">Send</button>
</div>


</div>




</body>

 <script>
        function sendMessage() {
            const input = document.getElementById('userInput')
            const messages = document.getElementById('messages')
            const typing = document.getElementById('typing')
            const question = input.value.trim()
            if (!question) return


            messages.innerHTML += `<div id="userMessage" class="message user" style="color: white;margin-left: 10px;">${question}</div>`
            input.value = ''
            messages.scrollTop = messages.scrollHeight

            typing.innerText = 'Diet Bot is thinking...'

            // send to Flask
            fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({question: question})
            })
            .then(res => res.json())
            .then(data => {
                typing.innerText = ''
                messages.innerHTML += `<div class="message bot" style="background-color: #1e1e2e; color: white; margin-left: 20px;">${data.answer}</div>`
                messages.scrollTop = messages.scrollHeight
            })
        }
    </script>
</html>
